apiVersion: apps/v1
kind: Deployment
metadata:
  name: vanyaai
  namespace: vanyaai
  labels:
    app: vanyaai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vanyaai
  template:
    metadata:
      labels:
        app: vanyaai
    spec:
      containers:
        - name: app
          image: YOUR_REGISTRY/vanyaai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - secretRef:
                name: vanyaai-env
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vanyaai-data
