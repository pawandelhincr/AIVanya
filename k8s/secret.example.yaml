# Copy to secret.yaml (do not commit real secrets).
# kubectl -n vanyaai create secret generic vanyaai-env --from-env-file=.env
apiVersion: v1
kind: Secret
metadata:
  name: vanyaai-env
  namespace: vanyaai
type: Opaque
stringData:
  TRADING_MODE: "paper"
  ACTIVE_BROKER: "zerodha"
  PUBLIC_BASE_URL: "https://www.vanyaai.com"
  ALLOW_DEMO_SUBSCRIBE: "false"
  ADMIN_EMAIL: "admin@vanyaai.com"
  ADMIN_PASSWORD: "CHANGE_ME"
  ADMIN_NAME: "Admin"
  KITE_API_KEY: ""
  KITE_API_SECRET: ""
  DHAN_CLIENT_ID: ""
  DHAN_ACCESS_TOKEN: ""
  OPENAI_API_KEY: ""
  OPENAI_BASE_URL: "https://openrouter.ai/api/v1"
  OPENAI_MODEL: "openrouter/owl-alpha"
  RAZORPAY_KEY_ID: ""
  RAZORPAY_KEY_SECRET: ""
